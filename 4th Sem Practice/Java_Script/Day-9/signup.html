<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    
  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      font-family: Arial;
    }

    .box{
      width: 420px;
      background: white;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }

    h1{
      margin-bottom: 20px;
      color: #0f21de;
    }

    button{
      padding: 12px 25px;
      border: none;
      background: blue;
      color: white;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover{
      background: #18cb33;
    }

    .info{
      margin-top: 25px;
      text-align: left;
    }

    .info h2{
      margin-top: 15px;
      font-size: 20px;
      color: #222;
    }

  </style>
</head>
<body>
  
    <legend> <h1>SignUp </legend>
    <br>
    <br>
    <form id="formData">
        <input type="text " placeholder="Enter your Name">
        <br>

        <br>
        <input type="email"  placeholder="Enter your Email">
        <br>

        <br>
        <input type="password" placeholder="Enter your password">
        <br>

        <button>Submit</button>

    </form>
    <br>

    
      <legend> <h2>login </legend>
    <br>
    <form id="LoginData">
        <input type="email " placeholder="Enter your Email">
        <br>
        <input type="password" placeholder="Enter your password">
        <br>

        <button>Submit</button>

    </form>



    <script  src="signup.js"></script>
    
</body>
</html>
