
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz App UI</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(to right,#1aeff3,#1f6fb2);
    }

    .quiz-box{
      width:380px;
      background:white;
      border-radius:18px;
      padding:25px;
      box-shadow:0 5px 20px rgba(0,0,0,0.2);
    }

    .title{
      text-align:center;
      font-size:32px;
      font-weight:bold;
      color:#2d5b88;
      margin-bottom:20px;
    }

    .score-box{
      background:#eef5fb;
      padding:10px;
      border-radius:10px;
      display:flex;
      justify-content:space-between;
      margin-bottom:20px;
      font-size:14px;
      color:#555;
    }

    .question-no{
      font-size:14px;
      color:#777;
      margin-bottom:10px;
    }

    .question{
      font-size:20px;
      font-weight:bold;
      margin-bottom:20px;
      color:#222;
    }

    .option{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      margin-bottom:15px;
      text-align:left;
      font-size:15px;
      background:#f4f4f4;
      cursor:pointer;
      transition:0.3s;
    }

    .option:hover{
      background:#dff8f5;
    }

    .active{
      background:linear-gradient(to right,#7ef0cf,#6dd5ed);
      color:white;
      font-weight:bold;
    }

    .next-btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#1d63c4;
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      margin-top:10px;
    }

    .next-btn:hover{
      background:#0d4ca3;
    }
  </style>
</head>

<body>

  <div class="quiz-container">

    <div class="title">🧠 Quiz Time!</div>

    <div>
    <div class="top-bar">
      <span>Score: <span id="Score">0</span></span>
      <span class="timer">⏱ <span id="timer">15</span></span>
    </div>

    <p class="question-num" id="questionNum">Question 1 of 5</p>
    <h2 class="question" id="question"></h2>

    <div class="options" id="options"></div>

    <button id="nextBtn" onclick="nextQuestion()" disabled> Next Question </button>
    </div>

    <div id="resultScreen" class="result hide">
        <h2>🎉 Quiz Complete!</h2>
        <div class="final-score" id="finalscore">0 / 5</div>
        <p id="resultMsg"></p>
        <button id="restartBtn" onclick="restartQuiz()">Play Again</button>
    </div>
  </div>

  <script src="quiz.js"></script>
</body>
</html>
